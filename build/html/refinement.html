<p>
        <strong class="heading">
        Definition ✍️
    </strong> <a class="heading-link" href="refinement.html">Refinement</a>
    </p>
    <p>
        We say that something refines something else if it is "more specific" is some sense, e.g:
    <ol>
        <li>In a state transition system, one transition relation <code>T</code> refines another <code>T'</code> if <code>∀s t, T s t → T' s t</code></li>
        <li>A strategy <code>V</code> refines another <code>V'</code> if <code>∀s, s ∈ V → s ∈ V'</code></li>
    </ol>
    </p>
